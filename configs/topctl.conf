# ============================================================================
#  TopCTL Configuration
#  Customize which checks to run and their thresholds
# ============================================================================

# Modules to run by default (comma-separated)
# Options: ssh, firewall, services, filesystem, users, updates
MODULES="ssh,firewall,services,filesystem,users,updates"

# SSH Settings
SSH_MAX_AUTH_TRIES=3
SSH_LOGIN_GRACE_TIME=60
SSH_CLIENT_ALIVE_INTERVAL=300
SSH_CLIENT_ALIVE_COUNT_MAX=2

# Password Policy
PASS_MAX_DAYS=365
PASS_MIN_DAYS=1
PASS_WARN_AGE=7

# Firewall
FW_DEFAULT_INCOMING="deny"
FW_DEFAULT_OUTGOING="allow"
FW_ALLOW_SSH=true

# Report
REPORT_FORMAT="text"  # text, json (json coming soon)
REPORT_KEEP_DAYS=30
